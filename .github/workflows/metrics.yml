name: GitHub Metrics

on:
  schedule:
    - cron: "0 */12 * * *"   # atualiza a cada 12 horas
  workflow_dispatch:           # permite rodar manualmente
  push:
    branches: [master]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Saldanhaa7
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Sao_Paulo
          config_output: svg
          filename: github-metrics.svg

          # Linguagens utilizadas
          plugin_languages: yes
          plugin_languages_auto_detected: yes
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%
          plugin_languages_indepth: yes
          plugin_languages_details: bytes-size, percentage

          # Atividade recente (contribuições externas aparecem aqui)
          plugin_activity: yes
          plugin_activity_limit: 8
          plugin_activity_days: 30
          plugin_activity_filter: contribution, push, pr, issue, review
          plugin_activity_visibility: all

          # Conquistas baseadas em contribuições
          plugin_achievements: yes
          plugin_achievements_threshold: X
          plugin_achievements_secrets: yes
          plugin_achievements_display: compact
          plugin_achievements_limit: 6
